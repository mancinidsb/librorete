version: '3.9'

services:
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  
  backend:
    build: ./backend
    working_dir: /backend
    volumes:
      - .:/backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: mydatabase
      DB_USER: myuser
      DB_PASSWORD: root
  
  frontend:
    build: ./frontend
    working_dir: /frontend
    volumes:
      - .:/frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: